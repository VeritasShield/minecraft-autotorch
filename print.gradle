gradle.rootProject {
    task printContainerInput {
        doLast {
            def cl = configurations.compileClasspath
            URL[] urls = cl.files.collect { it.toURI().toURL() } as URL[]
            URLClassLoader loader = new URLClassLoader(urls, null)
            Class<?> clazz = loader.loadClass("net.minecraft.client.multiplayer.MultiPlayerGameMode")
            def outFile = new File("methods.txt")
            outFile.write("")
            clazz.declaredMethods.each {
                outFile.append("METHOD: " + it.name + " " + Arrays.toString(it.parameterTypes) + "\n")
            }
        }
    }
}
